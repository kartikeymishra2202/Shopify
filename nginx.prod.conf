events { worker_connections 1024; }

http {
    include /etc/nginx/mime.types;

    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    server {
        listen 80;
        # Set to your EC2 public IP / domain, or leave as `_` to match all.
        server_name _;

        # Frontend (served by the `frontend` container's nginx)
        location / {
            proxy_pass http://frontend:80;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Django API
        location /api/ {
            proxy_pass http://shopify_backend:8000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # FastAPI WebSockets
        location /ws/ {
            proxy_pass http://chatservice_fastapi:8001;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Django Media/Static (if you serve these from Django)
        location /media/ {
            proxy_pass http://shopify_backend:8000/media/;
            proxy_set_header Host $host;
        }

        location /static/ {
            proxy_pass http://shopify_backend:8000/static/;
            proxy_set_header Host $host;
        }
    }
}
