worker_processes  1;

events {
    worker_connections  1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;
    sendfile        on;
    keepalive_timeout  65;
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=5r/s;
    limit_req_status 429;

    server {
        listen       80;
        server_name  localhost;

        # 1. Route for Django API (Port 8000)
        location /api/ {
            limit_req zone=api_limit burst=10 nodelay;
            proxy_pass http://shopify:8000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # 2. Route for FastAPI WebSockets (Port 8001)
        location /ws/ {
            proxy_pass http://fastapi:8001;

            # WebSocket Support (CRITICAL)
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "Upgrade";

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # 3. Route for Django Media/Static
        location /media/ {
            proxy_pass http://shopify:8000/media/;
            proxy_set_header Host $host;
        }

        location /static/ {
            proxy_pass http://shopify:8000/static/;
            proxy_set_header Host $host;
        }
    }
}
